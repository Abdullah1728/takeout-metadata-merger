name: build-and-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    name: Build on ${{ matrix.os }}
    strategy:

      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: metadata-merger
            asset_name: metadata-merger-linux

          - os: windows-latest
            binary_name: metadata-merger.exe
            asset_name: metadata-merger-windows.exe

          - os: macos-latest
            binary_name: metadata-merger
            asset_name: metadata-merger-macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
#         cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller tqdm

      - name: Compile Binary
        run: pyinstaller --clean --onefile --noconfirm --hidden-import=tqdm --name metadata-merger main.py

      - name: Prepare Executable Assets
        shell: bash
        run: |
          mkdir -p release
          cp "dist/${{ matrix.binary_name }}" "release/${{ matrix.asset_name }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "release/${{ matrix.asset_name }}"
          fi


      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: release/${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 1   


  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build            
    if: success()           

    steps:

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
